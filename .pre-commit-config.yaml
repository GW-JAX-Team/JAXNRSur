ci:
  skip: [uv-lock, pyright]

repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.28
    hooks:
      - id: uv-lock
        args: ["--upgrade"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: ["--fix"]
        files: src/
      - id: ruff-format
        files: src/

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.411
    hooks:
      - id: pyright
        files: src/
        additional_dependencies: [beartype, jax, jaxtyping, equinox, lineax, h5py, typing_extensions, requests]
